<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAGS Launchpad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-glow"></div>

<div class="app">

<header class="header">
  <div class="logo"></div>
  <div id="ton-connect"></div>
</header>

<main class="main">

  <div class="card">

    <h1>TAGS</h1>
    <p class="desc">1 TON = 10,000 TAGS</p>

    <div class="amount-box">
      <button id="minusBtn">−</button>
      <input id="tonInput" type="number" value="1">
      <button id="plusBtn">+</button>
    </div>

    <div class="quick">
      <button class="quickBtn" data-value="1">1</button>
      <button class="quickBtn" data-value="5">5</button>
      <button class="quickBtn" data-value="10">10</button>
      <button class="quickBtn" data-value="50">50</button>
      <button class="quickBtn" data-value="100">MAX</button>
    </div>

    <div id="tagsOutput" class="result">10000 TAGS</div>

    <button id="mintBtn" class="mint">Mint Now</button>

    <div class="loader" id="loader"></div>
    <p id="status">Not connected</p>

    <div class="social">
      <a href="https://t.me/TagsTalk" class="icon tg" target="_blank"></a>
      <a href="https://x.com/M0G143" class="icon x" target="_blank"></a>
    </div>

  </div>

</main>

</div>

<script type="module" src="/src/app.js"></script>

</body>
</html>
