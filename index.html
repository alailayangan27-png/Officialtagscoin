<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAGS Presale</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<div class="card">

<div class="logo"></div>

<h1>TAGS Presale</h1>

<button id="connectBtn">Connect Wallet</button>

<div class="quick">
<button class="quickBtn" data-value="1">1</button>
<button class="quickBtn" data-value="5">5</button>
<button class="quickBtn" data-value="10">10</button>
<button class="quickBtn" data-value="50">50</button>
<button class="quickBtn" data-value="100">MAX</button>
</div>

<div class="amount-box">
<button id="minusBtn">−</button>
<input id="tonInput" type="number" value="1">
<button id="plusBtn">+</button>
</div>

<p id="tagsOutput">10000 TAGS</p>

<button id="mintBtn">Mint</button>

<div class="loader" id="loader"></div>

<p id="status">No transaction yet</p>

</div>
</div>

<script type="module" src="/src/app.js"></script>

</body>
</html>
